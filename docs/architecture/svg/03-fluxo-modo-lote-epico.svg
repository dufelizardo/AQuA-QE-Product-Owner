<ellipse cx='550.0' cy='70.0' rx='170.0' ry='30.0' fill='#d5e8d4' stroke='#82b366' stroke-width='1.5'/><text x='550.0' y='65.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Entrada completa</tspan><tspan x='550.0' dy='14.175'>(.txt/.md ou pagina Confluence)</tspan></text><rect x='380' y='130' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='157.70000000000002' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>read_text_file / read_confluence_page</tspan></text><rect x='380' y='210' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='230.27499999999998' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>extract_requirements</tspan><tspan x='550.0' dy='14.175'>(lista de requisitos candidatos)</tspan></text><rect x='380' y='290' width='340' height='60' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='308.1875' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>extract_prd_context</tspan><tspan x='550.0' dy='14.175'>(visao, requisitos nao funcionais, riscos,</tspan><tspan x='550.0' dy='14.175'>criterios de sucesso, restricoes, dependencias)</tspan></text><rect x='380' y='380' width='340' height='60' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='398.1875' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>identify_epic_groups</tspan><tspan x='550.0' dy='14.175'>(agrupa requisitos por coerencia tematica --</tspan><tspan x='550.0' dy='14.175'>1 grupo se coeso, N se cobrir frentes distintas)</tspan></text><rect x='380' y='470' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='490.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Por grupo: generate_epic_metadata</tspan><tspan x='550.0' dy='14.175'>(texto + requisitos do grupo -- SEM stories ainda)</tspan></text><rect x='380' y='550' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='577.6999999999999' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>validate_epic (checklist Python puro)</tspan></text><polygon points='550.0,630 720,680.0 550.0,730 380,680.0' fill='#ffe6cc' stroke='#d79b00' stroke-width='1.5'/><text x='550.0' y='675.2750000000001' text-anchor='middle' font-size='10.5' font-weight='bold' font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Continuar e gerar as User Stories</tspan><tspan x='550.0' dy='14.175'>d{estes N Epicos / este Epico}?</tspan></text><rect x='800' y='650' width='300' height='60' rx='8' ry='8' fill='#f8cecc' stroke='#b85450' stroke-width='1.5' stroke-dasharray='6,4'/><text x='950.0' y='675.2750000000001' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='950.0' dy='0'>Execucao interrompida:</tspan><tspan x='950.0' dy='14.175'>nenhuma User Story foi gerada</tspan></text><text x='550.0' y='777.3625000000001' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Por Epico, para cada requisito do seu grupo:</tspan></text><rect x='380' y='800' width='340' height='60' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='825.2750000000001' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>identify_actor / identify_goal /</tspan><tspan x='550.0' dy='14.175'>identify_business_rules</tspan></text><polygon points='550.0,880 720,930.0 550.0,980 380,930.0' fill='#ffe6cc' stroke='#d79b00' stroke-width='1.5'/><text x='550.0' y='925.2750000000001' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Ator e objetivo</tspan><tspan x='550.0' dy='14.175'>identificados com confianca?</tspan></text><rect x='800' y='900' width='300' height='60' rx='8' ry='8' fill='#f8cecc' stroke='#b85450' stroke-width='1.5' stroke-dasharray='6,4'/><text x='950.0' y='925.2750000000001' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='950.0' dy='0'>Nao: unresolved_items += item</tspan><tspan x='950.0' dy='14.175'>(nao trava o restante do lote)</tspan></text><rect x='380' y='1000' width='340' height='70' rx='0' ry='0' fill='#fff2cc' stroke='#d6b656' stroke-width='1.5' /><line x1='390' y1='1000' x2='390' y2='1070' stroke='#d6b656' stroke-width='1.5'/><line x1='710' y1='1000' x2='710' y2='1070' stroke='#d6b656' stroke-width='1.5'/><text x='550.0' y='1023.1875' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Sim: gera a story completa</tspan><tspan x='550.0' dy='14.175'>(mesmo pipeline do Diagrama 2:</tspan><tspan x='550.0' dy='14.175'>generate_story -&gt; validate_story -&gt; review_story)</tspan></text><rect x='380' y='1090' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='1110.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>story draft_validated adicionada</tspan><tspan x='550.0' dy='14.175'>a epic.stories</tspan></text><rect x='380' y='1180' width='340' height='60' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='1198.1875' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>validate_traceability:</tspan><tspan x='550.0' dy='14.175'>stories_duplicadas, stories_sem_valor,</tspan><tspan x='550.0' dy='14.175'>requisitos_orfaos</tspan></text><rect x='380' y='1270' width='340' height='60' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='1295.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>review_epic (LLM revisor - phi4,</tspan><tspan x='550.0' dy='14.175'>agora com as stories existentes)</tspan></text><rect x='380' y='1360' width='340' height='60' rx='0' ry='0' fill='#fff2cc' stroke='#d6b656' stroke-width='1.5' /><line x1='390' y1='1360' x2='390' y2='1420' stroke='#d6b656' stroke-width='1.5'/><line x1='710' y1='1360' x2='710' y2='1420' stroke='#d6b656' stroke-width='1.5'/><text x='550.0' y='1385.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Refinamento por story</tspan><tspan x='550.0' dy='14.175'>(ver Diagrama 4, por story reprovada)</tspan></text><polygon points='550.0,1450 720,1500.0 550.0,1550 380,1500.0' fill='#ffe6cc' stroke='#d79b00' stroke-width='1.5'/><text x='550.0' y='1494.6' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Aceite humano</tspan><tspan x='550.0' dy='16.200000000000003'>explicito do Epico?</tspan></text><rect x='800' y='1470' width='300' height='60' rx='8' ry='8' fill='#f8cecc' stroke='#b85450' stroke-width='1.5' stroke-dasharray='6,4'/><text x='950.0' y='1495.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='950.0' dy='0'>Permanece draft_validated /</tspan><tspan x='950.0' dy='14.175'>pending_clarification</tspan></text><rect x='380' y='1580' width='340' height='50' rx='8' ry='8' fill='#d5e8d4' stroke='#82b366' stroke-wid