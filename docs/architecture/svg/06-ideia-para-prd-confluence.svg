<ellipse cx='550.0' cy='65.0' rx='170.0' ry='25.0' fill='#d5e8d4' stroke='#82b366' stroke-width='1.5'/><text x='550.0' y='59.599999999999994' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Ideia informal</tspan><tspan x='550.0' dy='16.200000000000003'>(--modo prd)</tspan></text><rect x='380' y='120' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='147.70000000000002' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>generate_prd (LLM gerador - mistral)</tspan></text><rect x='380' y='200' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='227.70000000000002' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>validate_prd (checklist Python puro)</tspan></text><polygon points='550.0,280 720,330.0 550.0,380 380,330.0' fill='#ffe6cc' stroke='#d79b00' stroke-width='1.5'/><text x='550.0' y='324.6' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Passa no</tspan><tspan x='550.0' dy='16.200000000000003'>checklist?</tspan></text><rect x='760' y='300' width='280' height='60' rx='8' ry='8' fill='#f8cecc' stroke='#b85450' stroke-width='1.5' stroke-dasharray='6,4'/><text x='900.0' y='324.6' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='900.0' dy='0'>PENDING_CLARIFICATION:</tspan><tspan x='900.0' dy='16.200000000000003'>PRD incompleto</tspan></text><rect x='380' y='410' width='340' height='50' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='437.7' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>review_prd (LLM revisor - phi4)</tspan></t