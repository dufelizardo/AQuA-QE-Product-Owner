fluence?</tspan></text><rect x='380' y='920' width='340' height='60' rx='8' ry='8' fill='#dae8fc' stroke='#6c8ebf' stroke-width='1.5' /><text x='550.0' y='945.2750000000001' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Pergunta titulo -&gt; create_confluence_page</tspan><tspan x='550.0' dy='14.175'>-&gt; URL da pagina retornada</tspan></text><polygon points='550.0,1010 720,1060.0 550.0,1110 380,1060.0' fill='#ffe6cc' stroke='#d79b00' stroke-width='1.5'/><text x='550.0' y='1055.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Continuar e gerar o</tspan><tspan x='550.0' dy='14.175'>Epico a partir deste PRD?</tspan></text><rect x='380' y='1140' width='340' height='60' rx='0' ry='0' fill='#fff2cc' stroke='#d6b656' stroke-width='1.5' /><line x1='390' y1='1140' x2='390' y2='1200' stroke='#d6b656' stroke-width='1.5'/><line x1='710' y1='1140' x2='710' y2='1200' stroke='#d6b656' stroke-width='1.5'/><text x='550.0' y='1165.275' text-anchor='middle' font-size='10.5'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Ver Diagrama 3:</tspan><tspan x='550.0' dy='14.175'>generate_epic_shape(texto_final) -&gt; ...</tspan></text><ellipse cx='550.0' cy='1255.0' rx='170.0' ry='25.0' fill='#d5e8d4' stroke='#82b366' stroke-width='1.5'/><text x='550.0' y='1257.7' text-anchor='middle' font-size='12'  font-family='Helvetica,Arial,sans-serif' fill='#1a1a1a'><tspan x='550.0' dy='0'>Fim</tspan></text><path d='M550.0,90 L550.0,120' fill='none' stroke='#444444' stroke-width='1.5'  marker-end="url(#arrow)"/><path d='M550.0,170 L550.0,200' fill='none' stroke='#444444' stroke-width='1.5'  marker-end="url(#arrow)"/><path d='M550.0,250 L550.0,280' fill='none' stroke='#444444' stroke-width='1.5'  marker-end="url(#arrow)"/><path d='M720,330 L760,330' fill='none' stroke='#444444' stroke-width='1.5'  marker-end="url(#arrow)"/><